<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Task 05 - Text Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Source+Serif+4:opsz,wght@8..60,500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <section class="card">
        <h1>Text Analyzer</h1>
        <p class="subtitle">
          Paste your paragraph and click <strong>Analyze Text</strong> to see a quick summary.
        </p>

        <label for="inputText" class="label">Your Text</label>
        <textarea
          id="inputText"
          placeholder="Write or paste your paragraph here..."
          rows="10"
        ></textarea>

        <button id="analyzeBtn" type="button">Analyze Text</button>

        <div id="result" class="result" aria-live="polite">
          <p class="result-message">No analysis yet.</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
